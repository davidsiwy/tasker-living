  <script>
      // Preloader jen tam, kde se skutecne ceka na session a data (#/app, #/operator, #/go).
      // Verejna homepage a Legal stranky se maji vykreslit hned — tmavy preloader
      // pred svetlou landing page je horsi nez zadny preloader.
      (function () {
        var h = window.location.hash || ''
        if (!/^#\/(app|operator|go)\b/.test(h)) document.documentElement.className += ' no-boot'
      })()
    </script>
    <style>html.no-boot #boot{display:none !important}</style>
    <script type="module" crossorigin src="./assets/index-mKWc70fi.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/react-CQrXKZwB.js">

  <body>
    <div id="root"></div>

    <!-- Instant preloader pro aplikacni routy: vykresli se driv, nez se stahne JS
         bundle, takze neni bily blesk pri obnoveni session. Na verejne homepage
         a Legal strankach se NEZOBRAZUJE (viz skript v <head>) — tam je obsah
         staticky a tmavy preloader pred svetlou strankou jen vadi.
         Odstranuje ho main.tsx, jakmile React nabehne. -->
    <div id="boot">
      <div class="boot-stage">
        <img class="boot-logo" src="logo-sm.png" alt="Tasker Living" />
        <span class="boot-spin"></span>
      </div>
    </div>

    <style>
      /* Jednoduchy svetly preloader. Pozadi je stejny papirovy odstin jako
         telo dokumentu (#F4F6F9), takze prechod na aplikaci neblikne. */
      #boot{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
        background:#F4F6F9;transition:opacity .3s ease,visibility .3s ease}
      #boot.boot-hide{opacity:0;visibility:hidden;pointer-events:none}
      .boot-stage{display:flex;flex-direction:column;align-items:center;gap:20px}
      .boot-logo{height:44px;width:auto;display:block}
      .boot-spin{width:22px;height:22px;border-radius:50%;box-sizing:border-box;
        border:2.5px solid #E1E5EA;border-top-color:#06C40A;animation:boot-spin .7s linear infinite}
      @keyframes boot-spin{to{transform:rotate(360deg)}}
      @media(prefers-reduced-motion:reduce){.boot-spin{animation-duration:2.4s}}
    </style>

  </body>
